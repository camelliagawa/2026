<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>包丁検出・計測ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>包丁検出・刃渡り計測ツール</h1>
      <p class="subtitle">カメラで包丁の形状と刃渡りを計測します</p>
    </header>

    <div id="main-content">
      <!-- カメラ選択・制御パネル -->
      <div id="control-panel">
        <div class="control-group">
          <label for="camera-select">カメラ選択</label>
          <select id="camera-select"></select>
          <button id="btn-start-camera" class="btn btn-primary">カメラ開始</button>
          <button id="btn-stop-camera" class="btn btn-danger" disabled>カメラ停止</button>
        </div>

        <div class="control-group">
          <label>キャリブレーション（実寸基準）</label>
          <div class="calibration-row">
            <input type="number" id="ref-length" value="85" min="1" max="500" step="0.1">
            <span>mm</span>
            <select id="ref-type">
              <option value="credit-card">クレジットカード幅 (85mm)</option>
              <option value="a4-short">A4用紙 短辺 (210mm)</option>
              <option value="coin-500">500円硬貨 (26.5mm)</option>
              <option value="custom">カスタム</option>
            </select>
          </div>
          <button id="btn-calibrate" class="btn btn-secondary" disabled>キャリブレーション開始</button>
          <span id="calibration-status" class="status-text"></span>
        </div>

        <div class="control-group">
          <label>検出モード</label>
          <div class="mode-buttons">
            <button id="btn-auto-detect" class="btn btn-primary" disabled>自動検出</button>
            <button id="btn-manual-measure" class="btn btn-secondary" disabled>手動計測</button>
            <button id="btn-capture" class="btn btn-accent" disabled>撮影・解析</button>
          </div>
        </div>

        <div class="control-group">
          <label>画像処理パラメータ</label>
          <div class="slider-row">
            <span>エッジ閾値(下):</span>
            <input type="range" id="canny-low" min="10" max="200" value="50">
            <span id="canny-low-val">50</span>
          </div>
          <div class="slider-row">
            <span>エッジ閾値(上):</span>
            <input type="range" id="canny-high" min="50" max="400" value="150">
            <span id="canny-high-val">150</span>
          </div>
          <div class="slider-row">
            <span>最小輪郭面積:</span>
            <input type="range" id="min-area" min="100" max="20000" value="2000" step="100">
            <span id="min-area-val">2000</span>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="show-edges" checked>
            <label for="show-edges">エッジ表示</label>
            <input type="checkbox" id="show-contours" checked>
            <label for="show-contours">輪郭表示</label>
          </div>
        </div>

        <div class="control-group">
          <button id="btn-save-image" class="btn btn-secondary" disabled>画像保存</button>
          <button id="btn-reset" class="btn btn-secondary">リセット</button>
        </div>
      </div>

      <!-- ビデオ・キャンバス表示エリア -->
      <div id="display-area">
        <div id="video-container">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay-canvas"></canvas>
          <div id="calibration-overlay" class="hidden">
            <div id="calibration-line"></div>
            <p>基準線をドラッグして合わせてください</p>
          </div>
          <div id="crosshair-h"></div>
          <div id="crosshair-v"></div>
        </div>

        <div id="canvas-container">
          <div class="canvas-label">処理済み画像</div>
          <canvas id="processed-canvas"></canvas>
        </div>
      </div>

      <!-- 計測結果パネル -->
      <div id="result-panel">
        <h2>計測結果</h2>
        <div id="results">
          <div class="result-item">
            <span class="result-label">検出状態:</span>
            <span id="res-status" class="result-value">待機中</span>
          </div>
          <div class="result-item">
            <span class="result-label">刃渡り長さ:</span>
            <span id="res-blade-length" class="result-value highlight">--</span>
            <span class="unit">mm</span>
          </div>
          <div class="result-item">
            <span class="result-label">刃幅（最大）:</span>
            <span id="res-blade-width" class="result-value">--</span>
            <span class="unit">mm</span>
          </div>
          <div class="result-item">
            <span class="result-label">外形 幅×高さ:</span>
            <span id="res-bbox" class="result-value">--</span>
            <span class="unit">mm</span>
          </div>
          <div class="result-item">
            <span class="result-label">傾き角度:</span>
            <span id="res-angle" class="result-value">--</span>
            <span class="unit">°</span>
          </div>
          <div class="result-item">
            <span class="result-label">キャリブレーション:</span>
            <span id="res-calib" class="result-value">未設定</span>
            <span class="unit">px/mm</span>
          </div>
        </div>

        <div id="measurement-history">
          <h3>計測履歴</h3>
          <table id="history-table">
            <thead>
              <tr>
                <th>#</th>
                <th>刃渡り (mm)</th>
                <th>刃幅 (mm)</th>
                <th>角度 (°)</th>
                <th>時刻</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
          <button id="btn-clear-history" class="btn btn-danger btn-sm">履歴クリア</button>
          <button id="btn-export-csv" class="btn btn-secondary btn-sm">CSV出力</button>
        </div>

        <div id="log-area">
          <h3>ログ</h3>
          <div id="log-output"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- OpenCV.js (CDNから読み込み) -->
  <script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="onOpenCvReady()" onerror="onOpenCvError()"></script>
  <script src="app.js"></script>
</body>
</html>
