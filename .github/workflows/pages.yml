name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate version info
        run: |
          COUNT=$(git rev-list --count HEAD)
          DATE=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
          SHA=$(git rev-parse --short HEAD)
          NOTE=$(head -1 NOTES 2>/dev/null | tr -d '"<>|\\' | tr -d '\n')
          echo "{\"version\":\"$COUNT\",\"date\":\"$DATE\",\"sha\":\"$SHA\",\"note\":\"$NOTE\"}" > version.json
          python3 -c "import sys,re; d=open('index.html',encoding='utf-8').read(); d=d.replace('<p id=\"version-info\" class=\"version-info\"></p>','<p id=\"version-info\" class=\"version-info\">'+sys.argv[1]+'</p>',1); d=re.sub(r'(src|href)=\"(app\\.js|style\\.css)\"', lambda m: m.group(1)+'=\"'+m.group(2)+'?v='+sys.argv[2]+'\"', d); open('index.html','w',encoding='utf-8').write(d)" "v${COUNT}  ${NOTE}  ${DATE}" "${SHA}"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
